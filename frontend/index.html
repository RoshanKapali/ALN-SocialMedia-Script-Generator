<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favlogo.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Content Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <div class="header-content">
            <img src="LOGO WHITE.png" alt="Social Media Content Generator Logo" class="header-logo">
            <h1>Social Media Content Generator</h1>
        </div>
    </header>

    <!-- MAIN LAYOUT -->
    <div class="main-layout">

        <!-- RIGHT CONTENT AREA -->
        <main class="content-area">
            <!-- INPUT SECTION -->
            <section class="input-wrapper">
                <!-- INPUT TABS -->
                <div class="tabs">
                    <button class="tab-btn active" data-tab="text">Paste Text</button>
                    <button class="tab-btn" data-tab="url">Enter URL</button>
                    <button class="tab-btn" data-tab="pdf">Upload PDF</button>
                </div>

                <!-- TAB 1: PASTE TEXT -->
                <div class="tab-content active" id="text-tab">
                    <textarea 
                        id="text-input" 
                        class="prompt-input"
                        placeholder="Enter your prompt here..."
                    ></textarea>
                </div>

                <!-- TAB 2: ENTER URL -->
                <div class="tab-content" id="url-tab">
                    <input 
                        type="url" 
                        id="url-input" 
                        class="prompt-input url-input"
                        placeholder="https://example.com/article"
                    >
                </div>

                <!-- TAB 3: UPLOAD PDF -->
                <div class="tab-content" id="pdf-tab">
                    <div class="file-upload-wrapper">
                        <input type="file" id="pdf-input" accept=".pdf">
                        <label for="pdf-input" class="file-upload-label" id="pdf-label">📄 Click to upload PDF</label>
                        <div class="pdf-file-display" id="pdf-file-display" style="display: none;">
                            <span class="pdf-filename" id="pdf-filename"></span>
                            <button type="button" class="pdf-remove-btn" id="pdf-remove-btn" title="Remove PDF">×</button>
                        </div>
                    </div>
                </div>

                <!-- OPTIONS ROW -->
                <div class="options-row">
                    <div class="format-selector">
                        <label class="section-label">Output Formats</label>
                        <div class="format-checkboxes">
                            <label class="format-check">
                                <input type="checkbox" name="format" value="linkedin" checked>
                                <span>LinkedIn</span>
                            </label>
                            <label class="format-check">
                                <input type="checkbox" name="format" value="meta">
                                <span>FB / Insta</span>
                            </label>
                            <label class="format-check">
                                <input type="checkbox" name="format" value="tiktok">
                                <span>TikTok</span>
                            </label>
                            <label class="format-check">
                                <input type="checkbox" name="format" value="newsletter">
                                <span>Newsletter</span>
                            </label>
                        </div>
                    </div>

                    <div class="side-options">
                        <div class="tiktok-options">
                            <label class="section-label">TikTok Type</label>
                            <select id="tiktok-type" class="select-input">
                                <option value="informative">Informative</option>
                                <option value="event">Event</option>
                                <option value="hiring">Hiring</option>
                                <option value="culture">Culture</option>
                                <option value="fun">Fun</option>
                            </select>
                        </div>
                        <div class="meta-options">
                            <label class="section-label">Meta Post Type</label>
                            <select id="meta-type" class="select-input">
                                <option value="general">General</option>
                                <option value="governance_weekly">Governance Weekly</option>
                                <option value="hiring">Hiring</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- GENERATE BUTTONS -->
                <div class="button-group">
                    <button id="generate-all-btn" class="btn-generate btn-all">All</button>
                    <button id="generate-btn" class="btn-generate">Generate Content</button>
                </div>
            </section>

            <!-- OUTPUT SECTION - SINGLE BOX -->
            <section class="output-section" id="output-section">
                <div class="output-placeholder">
                    <p>Your generated content will appear here</p>
                </div>
            </section>
        </main>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>&copy; 2026 ALN Social Media Content Generator. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
